<!DOCTYPE html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dullinger schiesst über das Tor</title><style>
:root{--bg:#0e1117;--card:#171c26;--line:#262d3a;--txt:#e7ecf3;--muted:#8b95a7;
--accent:#e2231a;--good:#2ecc71;--bad:#e74c3c;--gold:#d9a521;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);color:var(--txt);display:flex;justify-content:center;min-height:100vh;padding:24px 16px;}
.wrap{width:100%;max-width:520px;}
header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;gap:12px;}
h1{font-size:18px;margin:0;letter-spacing:.5px;}
.sub{color:var(--muted);font-size:13px;margin:3px 0 0;letter-spacing:.4px;}
.scores{text-align:right;font-size:12px;color:var(--muted);white-space:nowrap;line-height:1.5;}
.scores b{font-size:15px;}
.scores .s b{color:var(--txt);}
.scores .best b{color:var(--accent);}
.scores .welt b{color:var(--gold);}
.q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 20px;}
.q .lead{color:var(--muted);font-size:13px;margin:0 0 8px;}
.q .club{font-size:24px;font-weight:700;margin:0 0 18px;line-height:1.25;
display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.q .club .crest{height:38px;width:38px;object-fit:contain;flex:0 0 auto;}
.q .club .dot{color:var(--muted);margin:0 2px;}
.q .club .chip{display:inline-flex;align-items:center;gap:9px;font-size:19px;}
.q .club .chip .crest{height:30px;width:30px;}
.crest.mono{display:inline-flex;align-items:center;justify-content:center;background:#2b3344;
color:var(--txt);border-radius:7px;font-weight:700;font-size:10px;line-height:1;letter-spacing:.3px;}
.opts{display:flex;flex-direction:column;gap:10px;}
button.opt{text-align:left;background:#1d2330;color:var(--txt);border:1px solid var(--line);
border-radius:10px;padding:12px 15px;cursor:pointer;transition:.12s;
display:flex;flex-direction:row;align-items:center;gap:12px;width:100%;}
button.opt .crestwrap{flex:0 0 28px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
button.opt .crestwrap .crest{max-width:28px;max-height:28px;width:auto;height:auto;object-fit:contain;}
button.opt .otext{display:flex;flex-direction:column;gap:2px;min-width:0;}
button.opt .oname{font-size:16px;line-height:1.2;}
button.opt .sub{font-size:12px;color:var(--muted);line-height:1.2;}
button.opt .sub:empty{display:none;}
button.opt:hover:not(:disabled){border-color:#3a4458;background:#222a3a;}
button.opt:disabled{cursor:default;}
button.opt.correct{background:rgba(46,204,113,.13);border-color:var(--good);}
button.opt.wrong{background:rgba(231,76,60,.13);border-color:var(--bad);}
.next{margin-top:16px;width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;
padding:14px;font-size:16px;font-weight:600;cursor:pointer;}
.next:hover{filter:brightness(1.08);}
.over{text-align:center;padding:26px 18px;}
.over h2{font-size:22px;margin:0 0 6px;}
.over .muted{color:var(--muted);margin:0 0 14px;font-size:13px;}
.over .big{font-size:46px;font-weight:800;color:var(--accent);}
.entry{margin:8px 0 4px;}
.entry p{margin:0 0 6px;font-size:14px;}
.entry input{width:100%;padding:11px 13px;border-radius:9px;border:1px solid var(--line);
background:#1d2330;color:var(--txt);font-size:16px;}
.entryrow{display:flex;gap:8px;margin-top:8px;}
.entryrow .next{margin-top:0;flex:1;}
.skip{background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:10px;
padding:0 16px;font-size:14px;cursor:pointer;}
.skip:hover{color:var(--txt);}
.boardh{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px;}
.board{list-style:none;margin:0;padding:0;text-align:left;}
.board li{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;}
.board li:nth-child(odd){background:#1b212c;}
.board li.me{background:rgba(217,165,33,.18);}
.board .rank{color:var(--muted);width:22px;font-variant-numeric:tabular-nums;}
.board .bn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.board .bs{font-weight:700;font-variant-numeric:tabular-nums;}
footer{text-align:center;color:var(--muted);font-size:11px;margin-top:18px;}
footer a{color:var(--muted);}
.back{display:inline-block;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:14px;}
.back:hover{color:var(--txt);}
</style></head><body>

<script>
window.MODE={make(){
  const pool3=players.filter(p=>p.c.length>=3);
  let answer,trio;
  if(pool3.length>=8){answer=wpick(pool3,new Set());trio=sample(answer.c,3);}
  else{const pool2=players.filter(p=>p.c.length>=2);answer=wpick(pool2,new Set());trio=sample(answer.c,2);}
  const distractPool=players.filter(p=>p.n!==answer.n && !trio.every(ci=>p.c.includes(ci)));
  const used=new Set([answer.n]);const dis=[];
  while(dis.length<3){const d=wpick(distractPool,used);used.add(d.n);dis.push(d);}
  const opts=shuffle([{p:answer,ok:true},...dis.map(p=>({p,ok:false}))]).map(o=>({
    text:o.p.n,crestCi:null,ok:o.ok,reveal:o.ok?'✓':clubsAmong(o.p,trio)}));
  const title=trio.map(clubChip).join('<span class="dot">·</span>');
  return {lead:'Welcher Spieler verbindet',titleHTML:title,subject:trio.map(ci=>clubs[ci]).join(' · '),options:opts};
}};</script>
<script>
const D=window.GAME_DATA, CFG=window.CFG, MODE=window.MODE, SB=CFG.sb;
const clubs=D.clubs, logos=D.logos, players=D.players;
const byClub=clubs.map(()=>[]); players.forEach(p=>p.c.forEach(ci=>byClub[ci].push(p)));
const rint=n=>Math.floor(Math.random()*n);
const pick=a=>a[rint(a.length)];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rint(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(a,n){const c=a.slice();shuffle(c);return c.slice(0,n);}
function wpick(pool,used){const cand=pool.filter(p=>!used.has(p.n));let t=0;for(const p of cand)t+=p.w;
let r=Math.random()*t;for(const p of cand){r-=p.w;if(r<=0)return p;}return cand[cand.length-1];}
function clubsLabel(p,hide){return p.c.filter(ci=>ci!==hide).map(ci=>clubs[ci]).join(', ');}
function clubsAmong(p,set){const n=set.filter(ci=>p.c.includes(ci)).map(ci=>clubs[ci]);return n.length?n.join(', '):'—';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function cleanName(s){return (s||'').replace(/[\u0000-\u001f<>]/g,'').trim().slice(0,16);}
function crest(ci){
  if(logos[ci])return `<img class="crest" src="${logos[ci]}" alt="">`;
  const t=(D.tags&&D.tags[ci])||clubs[ci].slice(0,3).toUpperCase();
  return `<span class="crest mono">${t}</span>`;
}
function clubTitle(ci){return `${crest(ci)}<span>${clubs[ci]}?</span>`;}
function clubChip(ci){return `<span class="chip">${crest(ci)}<span>${clubs[ci]}</span></span>`;}

// ---- supabase (anon, public key by design) ----
const sbH={apikey:SB.key,Authorization:'Bearer '+SB.key,'Content-Type':'application/json'};
function sbGet(p){return fetch(SB.url+'/rest/v1/'+p,{headers:sbH}).then(r=>r.ok?r.json():[]).catch(()=>[]);}
function sbPost(p,b){return fetch(SB.url+'/rest/v1/'+p,{method:'POST',headers:Object.assign({},sbH,{Prefer:'return=minimal'}),body:JSON.stringify(b)}).catch(()=>{});}
function fetchTop(){return sbGet('plays?select=name,score&mode=eq.'+CFG.mode+'&name=not.is.null&order=score.desc,created_at.asc&limit=10');}

// ---- session / device ----
let sid=localStorage.getItem('bl_sid');
if(!sid){sid=(self.crypto&&crypto.randomUUID)?crypto.randomUUID():'s'+Date.now()+Math.random().toString(36).slice(2);localStorage.setItem('bl_sid',sid);}
const uuid=()=>(self.crypto&&crypto.randomUUID)?crypto.randomUUID():'g'+Date.now()+Math.random().toString(36).slice(2);

const stage=document.getElementById('stage');
const elS=document.getElementById('streak'), elB=document.getElementById('best'), elW=document.getElementById('welt');
let streak=0, best=+(localStorage.getItem(CFG.key)||0); elB.textContent=best;
let gameId, gameStart, gameAnswers=[];

fetchTop().then(t=>{ if(t.length) elW.textContent=t[0].score; });

function startRun(){ gameId=uuid(); gameStart=Date.now(); gameAnswers=[]; streak=0; elS.textContent=0; newQuestion(); }

function optHTML(o,i){
  const c=o.crestCi!=null?`<span class="crestwrap">${crest(o.crestCi)}</span>`:'';
  return `<button class="opt" data-i="${i}">${c}<span class="otext"><span class="oname">${o.text}</span><span class="sub"></span></span></button>`;
}
function newQuestion(){
  const q=MODE.make();
  stage.innerHTML=`<div class="q"><p class="lead">${q.lead}</p>
    <div class="club">${q.titleHTML}</div>
    <div class="opts">${q.options.map(optHTML).join('')}</div></div>`;
  stage.querySelectorAll('button.opt').forEach(b=>b.onclick=()=>answer(+b.dataset.i,q));
}
function answer(i,q){
  const chosen=q.options[i], btns=stage.querySelectorAll('button.opt');
  const okText=(q.options.find(o=>o.ok)||{}).text||'';
  gameAnswers.push({game_id:gameId,mode:CFG.mode,session_id:sid,prompt:q.subject||'',answer:okText,correct:!!chosen.ok});
  btns.forEach((b,j)=>{b.disabled=true;const o=q.options[j];b.querySelector('.sub').textContent=o.reveal||'';if(o.ok)b.classList.add('correct');});
  if(chosen.ok){streak++;elS.textContent=streak;
    if(streak>best){best=streak;localStorage.setItem(CFG.key,best);elB.textContent=best;}
    const nx=document.createElement('button');nx.className='next';nx.textContent='Weiter →';nx.onclick=newQuestion;stage.querySelector('.q').appendChild(nx);
  }else{btns[i].classList.add('wrong');
    const nx=document.createElement('button');nx.className='next';nx.textContent='Weiter →';
    nx.onclick=gameOver;stage.querySelector('.q').appendChild(nx);}
}

async function gameOver(){
  const f=streak; streak=0; elS.textContent=0;
  const duration=Math.round((Date.now()-gameStart)/1000);
  if(gameAnswers.length) sbPost('answers',gameAnswers);
  const top=await fetchTop();
  const qualifies = f>0 && (top.length<10 || f>top[top.length-1].score);
  let saved=false;
  const savePlay=(name)=>{ if(saved)return; saved=true;
    sbPost('plays',[{game_id:gameId,mode:CFG.mode,score:f,name:name||null,session_id:sid,duration:duration}]); };

  function boardHTML(hlName){
    if(!top.length) return '<p class="muted">Noch keine Einträge — sei der Erste!</p>';
    return '<ol class="board">'+top.map((e,i)=>
      `<li class="${hlName&&e.name===hlName&&e.score===f?'me':''}"><span class="rank">${i+1}</span><span class="bn">${esc(e.name)}</span><span class="bs">${e.score}</span></li>`
    ).join('')+'</ol>';
  }
  function render(hlName){
    let entry='';
    if(qualifies && !saved){
      const cached=esc(localStorage.getItem('bl_name')||'');
      entry=`<div class="entry"><p>🏆 Top 10! Trag dich ein:</p>
        <input id="nm" maxlength="16" placeholder="Dein Name" value="${cached}">
        <div class="entryrow"><button class="next" id="save" disabled>Eintragen</button>
        <button class="skip" id="skip">Überspringen</button></div></div>`;
    } else if(!qualifies && f>0){
      const need = top.length>=10 ? (top[top.length-1].score - f + 1) : 1;
      entry=`<p class="muted">Noch ${need} für die Top 10.</p>`;
    }
    stage.innerHTML=`<div class="q over">
      <p class="muted">Serie beendet</p><div class="big">${f}</div><h2>richtige in Folge</h2>
      <p class="muted">Deine Bestleistung: ${best}</p>
      ${entry}
      <h3 class="boardh">Weltrangliste</h3>${boardHTML(hlName)}
      <button class="next" id="again">Nochmal spielen</button></div>`;
    document.getElementById('again').onclick=()=>{ if(!saved) savePlay(null); startRun(); };
    if(qualifies && !saved){
      const nm=document.getElementById('nm'), save=document.getElementById('save');
      const upd=()=>{save.disabled=cleanName(nm.value).length===0;}; nm.addEventListener('input',upd); upd();
      save.onclick=()=>{ const name=cleanName(nm.value); if(!name)return;
        localStorage.setItem('bl_name',name); savePlay(name);
        top.push({name,score:f}); top.sort((a,b)=>b.score-a.score); if(top.length>10)top.length=10;
        if(f>(+elW.textContent||0)) elW.textContent=f;
        render(name); };
      document.getElementById('skip').onclick=()=>{ savePlay(null); render(null); };
    } else if(!qualifies){
      savePlay(null);
    }
  }
  render(null);
}

startRun();
</script>
